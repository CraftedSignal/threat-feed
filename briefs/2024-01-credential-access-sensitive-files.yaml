id: brief-2024-01-03-credential-access-sensitive-files
slug: 2024-01-credential-access-sensitive-files
title: Credential Access via Sensitive File Collection (Linux)
summary: This rule detects potential credential access attempts on Linux systems by monitoring for processes accessing sensitive files commonly containing credentials or configuration information.
severity: high
published_at: "2024-01-03T10:00:00Z"
content: |
    ## Overview

    This detection focuses on identifying potential credential access attempts on Linux systems. Attackers often target sensitive files containing credentials, API keys, or configuration information to gain unauthorized access to systems or data. The rule monitors process access to files commonly used to store sensitive information. While the specific attacker and campaign are unknown, this type of credential harvesting is a common tactic employed by various threat actors after gaining initial access to a system. Timely detection is crucial to prevent further compromise and lateral movement.

    ## Attack Chain

    1. **Initial Access:** (Hypothetical) An attacker gains initial access to a Linux system through an exploit or compromised credentials.
    2. **Privilege Escalation:** (Hypothetical) The attacker escalates privileges to gain read access to a wider range of files.
    3. **File Access:** A process attempts to read sensitive files such as `/etc/passwd`, `/etc/shadow`, `/etc/group`, `/var/log/apache2/access.log`, `/var/log/nginx/access.log`, configuration files, and `.bash_history`.
    4. **Credential Harvesting:** The attacker parses the contents of the accessed files, looking for usernames, passwords, API keys, and other sensitive information.
    5. **Lateral Movement:** Using the harvested credentials, the attacker attempts to move laterally to other systems on the network.
    6. **Data Exfiltration:** Sensitive data is exfiltrated from the compromised network.

    ## Impact

    Successful exploitation can lead to unauthorized access to sensitive systems and data. This can result in data breaches, financial loss, and reputational damage. The number of victims and sectors targeted is currently unknown due to the generic nature of this detection. However, the impact can be significant if attackers successfully harvest credentials and move laterally within the network.
tags:
    - credential-access
    - linux
    - file-access
references:
    - https://github.com/elastic/detection-rules/blob/main/rules/linux/credential_access_collection_sensitive_files.toml
rules:
    - title: Detect Access to Sensitive Files
      description: Detects processes accessing sensitive files commonly containing credentials or configuration information on Linux systems.
      logsource:
        category: file_event
        product: linux
      detection:
        condition: selection
        selection:
            file.path|endswith:
                - /etc/passwd
                - /etc/shadow
                - /etc/group
                - /var/log/apache2/access.log
                - /var/log/nginx/access.log
                - /.bash_history
      level: high
      tags:
        - attack.credential_access
        - attack.t1003
      tests:
        positive:
            - name: Access to /etc/shadow
              data:
                - file.path: /etc/shadow
                  process.name: cat
        negative:
            - name: Access to /etc/passwd by systemd
              data:
                - file.path: /etc/passwd
                  process.name: systemd
    - title: Detect Suspicious Process Accessing Sensitive Files
      description: Detects processes not commonly associated with accessing sensitive files.
      logsource:
        category: process_creation
        product: linux
      detection:
        condition: selection
        selection:
            file.path|endswith:
                - /etc/passwd
                - /etc/shadow
                - /etc/group
            process.name|startswith:
                - curl
                - wget
                - python
      level: medium
      tags:
        - attack.credential_access
        - attack.t1003
      tests:
        positive:
            - name: Python script accessing /etc/shadow
              data:
                - file.path: /etc/shadow
                  process.name: python
        negative:
            - name: Normal process (e.g., useradd) accessing /etc/passwd
              data:
                - file.path: /etc/passwd
                  process.name: useradd
ttps:
    - tactic_id: TA0006
      tactic_name: Credential Access
      technique_id: T1003
      technique_name: OS Credential Dumping
