id: brief-2024-01-03-process-kill-threshold
slug: 2024-01-03-process-kill-threshold
title: High Number of Process Terminations Detected
summary: Detection of an unusually high number of process terminations on a Linux system, potentially indicating malicious activity such as a denial-of-service attempt or ransomware activity.
severity: medium
published_at: "2024-01-03T12:00:00Z"
content: |
    ## Overview

    This alert focuses on detecting an unusual surge in process termination events on Linux systems. While normal system operation involves process creation and termination, a sudden spike in the number of killed processes can signal malicious activity. This could be indicative of a denial-of-service (DoS) attack attempting to cripple the system by terminating critical processes, or ransomware attempting to stop security software before encryption. Defenders should investigate any such events to understand the root cause and prevent further damage. The rule aims to catch abnormal activity, not specific malware families.

    ## Attack Chain

    1.  An attacker gains initial access to the system through an exploit or compromised credentials (details not specified in source).
    2.  The attacker executes a script or program designed to terminate processes.
    3.  The malicious script iterates through a list of process names or PIDs.
    4.  The `kill` command or a similar system call is used to terminate each targeted process.
    5.  The system logs each process termination event.
    6.  The detection rule triggers when the number of process termination events exceeds a defined threshold within a specific time window.
    7.  If successful, critical system processes or security software are terminated.
    8.  This leads to system instability, data encryption (in the case of ransomware), or denial of service.

    ## Impact

    A successful attack leading to a high number of process terminations can have several critical consequences. It can lead to a denial-of-service condition, making the system unavailable to legitimate users. In the context of ransomware attacks, terminating security software can allow the ransomware to encrypt data unimpeded, leading to data loss and potential financial repercussions. The number of affected systems and the severity of the impact will depend on the scope of the initial compromise and the attacker's objectives.
tags:
    - process-termination
    - denial-of-service
    - linux
references: []
rules:
    - title: High Process Termination Count
      description: Detects a high number of process termination events within a short timeframe, potentially indicating malicious activity.
      logsource:
        category: process_creation
        product: linux
      detection:
        count: 10
        selection:
            name: kill
        timeframe: 60
      level: medium
      tags:
        - attack.impact
        - attack.t1489
      tests:
        positive:
            - name: Multiple kill commands executed
