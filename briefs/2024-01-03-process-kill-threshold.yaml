    - title: Process Termination of Critical System Processes
      description: Detects process termination events targeting critical system processes.
      logsource:
        category: process_creation
        product: linux
      detection:
        condition: selection
        selection:
            CommandLine|contains:
                - systemd
                - init
                - sshd
            name: kill
      level: high
      tags:
        - attack.impact
        - attack.t1489
      tests:
        positive:
            - name: Kill command targeting systemd
              data:
                - CommandLine: kill -9 1
                  end_time: "2024-01-01T00:00:05Z"
                  executable: /bin/kill
                  exit_code: "0"
                  gid: "0"
                  name: kill
                  pid: "1234"
                  ppid: "5678"
                  signal: SIGKILL
                  start_time: "2024-01-01T00:00:00Z"
                  uid: "0"
        negative:
            - name: Kill command targeting a user process
              data:
                - CommandLine: kill -9 2345
                  end_time: "2024-01-01T00:00:05Z"
                  executable: /bin/kill
                  exit_code: "0"
                  gid: "1000"
                  name: kill
                  pid: "1234"
                  ppid: "5678"
                  signal: SIGKILL
                  start_time: "2024-01-01T00:00:00Z"
                  uid: "1000"
    - title: Process Termination by Suspicious Parent Process
      description: Detects kill commands initiated by unusual or unexpected parent processes.
      logsource:
        category: process_creation
        product: linux
      detection:
        condition: selection and not filter
        filter:
            ParentImage|startswith:
                - /usr/bin
                - /bin
                - /sbin
                - /opt
        selection:
            name: kill
      level: medium
      tags:
        - attack.defense_evasion
        - attack.t1070
      tests:
        positive:
            - name: Kill command by /tmp/script.sh
              data:
                - ParentImage: /tmp/script.sh
                  end_time: "2024-01-01T00:00:05Z"
                  executable: /bin/kill
                  exit_code: "0"
                  gid: "0"
                  name: kill
                  pid: "1234"
                  ppid: "5678"
                  signal: SIGKILL
                  start_time: "2024-01-01T00:00:00Z"
                  uid: "0"
        negative:
            - name: Kill command from /bin/bash
              data:
                - ParentImage: /bin/bash
                  end_time: "2024-01-01T00:00:05Z"
                  executable: /bin/kill
                  exit_code: "0"
                  gid: "1000"
                  name: kill
                  pid: "1234"
                  ppid: "5678"
